version: "3.8"

# YouTube live -> RTSP bridge for WildWatch.
#
# `mediamtx` runs an RTSP server on localhost:8554. `bore` tunnels
# that port to a public bore.pub:<remote_port>. VideoDB cannot read
# local addresses, so we always paste the bore.pub URL into the
# dashboard's +Add -> RTSP form.
#
# Usage:
#   docker compose -f bridge/docker-compose.yml up -d
#   docker compose -f bridge/docker-compose.yml logs -f bore
#     -> look for "listening at bore.pub:<port>"
#   ./bridge/start_bridge.sh "<youtube_url>" <slug>
#   # In the dashboard: + Add -> RTSP -> rtsp://bore.pub:<port>/<slug>
services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: wildwatch-mediamtx
    # Port mapping (NOT network_mode: host) so the macOS host can
    # actually reach localhost:8554 — Docker Desktop's host networking
    # only works inside its Linux VM and doesn't expose container
    # ports to the macOS host.
    ports:
      - "8554:8554"   # RTSP
      - "1935:1935"   # RTMP
      - "8889:8889"   # WebRTC HTTP (optional)
    environment:
      - MTX_PROTOCOLS=tcp
    restart: unless-stopped

  bore:
    image: ekzhang/bore:latest
    container_name: wildwatch-bore
    # `bore local 8554 --to bore.pub` forwards mediamtx:8554 to a
    # public bore.pub:<remote_port>. Use the docker network (not
    # host) so this container resolves `mediamtx` by service name.
    # Remote port changes per restart; read it from:
    #   docker compose -f bridge/docker-compose.yml logs bore | grep "listening at"
    command: ["local", "--local-host", "mediamtx", "8554", "--to", "bore.pub"]
    restart: unless-stopped
    depends_on:
      - mediamtx
