# One-shot WildWatch stack.
#
# Quick start:
#   cp .env.example .env  &&  edit creds  &&  docker compose up
#
# Profiles:
#   --profile tunnel    -> include cloudflared (needs CLOUDFLARED_TUNNEL_TOKEN)
#
# After `up`, dashboard is at http://localhost:8000/.
# RTSP publish target for bridges: rtsp://localhost:8554/<name>.
# Public RTSP for VideoDB: bore.pub:<remote_port> (see bore logs).

services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: wildwatch-mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"   # RTSP
      - "1935:1935"   # RTMP
      - "8888:8888"   # HLS
    volumes:
      - ./bridge/mediamtx.yml:/mediamtx.yml:ro
    networks:
      - wildwatch

  wildwatch:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wildwatch-app
    restart: unless-stopped
    depends_on:
      - mediamtx
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./.state.json:/app/.state.json
      - ./logs:/app/logs
      - ./prompts:/app/prompts:ro
      - ./samples:/app/samples
    networks:
      - wildwatch
    # Wait until mediamtx is reachable before starting uvicorn
    command: >
      sh -c "until python -c 'import socket; s=socket.socket(); s.settimeout(1); s.connect((\"mediamtx\", 8554))' 2>/dev/null; do echo 'waiting for mediamtx...'; sleep 1; done;
             exec uvicorn wildwatch.webhooks:app --host 0.0.0.0 --port 8000"

  bore:
    image: ekzhang/bore
    container_name: wildwatch-bore
    restart: unless-stopped
    depends_on:
      - mediamtx
    networks:
      - wildwatch
    command: ["local", "--local-host", "mediamtx", "--to", "bore.pub", "8554"]

  # Opt-in: docker compose --profile tunnel up
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: wildwatch-cloudflared
    restart: unless-stopped
    depends_on:
      - wildwatch
    profiles: ["tunnel"]
    networks:
      - wildwatch
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - "${CLOUDFLARED_TUNNEL_TOKEN:-}"

networks:
  wildwatch:
    driver: bridge
